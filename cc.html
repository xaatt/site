<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>crypto_terminal</title>
	<link rel="stylesheet" href="cc.css">
</head>
<body>
	<div class="terminal-container">
		<table>
			<thead>
				<tr>
					<th>pair</th>
					<th>price</th>
					<th>24h</th>
					<th>7d</th>
					<th>30d</th>
					<th class="hide-mobile">year</th>
				</tr>
			</thead>
			<tbody>
	<tr>
		<td class="pair-cell">BTC/USD</td>
		<td class="price-cell">59430.08</td>
		<td class="change-cell down">-1.21%</td>
		<td class="change-cell down">-0.61%</td>
		<td class="change-cell down">-0.61%</td>
		<td class="change-cell hide-mobile down">-0.61%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/USD</td>
		<td class="price-cell">42.49</td>
		<td class="change-cell up">+0.44%</td>
		<td class="change-cell up">+1.23%</td>
		<td class="change-cell up">+1.23%</td>
		<td class="change-cell hide-mobile up">+1.23%</td>
	</tr>
	<tr>
		<td class="pair-cell">BTC/LTC</td>
		<td class="price-cell">1396.65</td>
		<td class="change-cell down">-1.82%</td>
		<td class="change-cell down">-1.82%</td>
		<td class="change-cell down">-1.82%</td>
		<td class="change-cell hide-mobile down">-1.82%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/BTC</td>
		<td class="price-cell">0.000716</td>
		<td class="change-cell up">+1.85%</td>
		<td class="change-cell up">+1.85%</td>
		<td class="change-cell up">+1.85%</td>
		<td class="change-cell hide-mobile up">+1.85%</td>
	</tr>
			</tbody>
		</table>
		<div class="date">$ last_update: 2026-06-28 19:28:06 UTC</div>
	</div>
</body>
</html>
