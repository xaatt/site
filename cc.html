<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>crypto_terminal</title>
	<link rel="stylesheet" href="cc.css">
</head>
<body>
	<div class="terminal-container">

			<thead>

					<th>price</th>
					<th>24h</th>

			</thead>
			<tbody>
	<tr>
		<td class="pair-cell">BTC/USD</td>
		<td class="price-cell">59234.18</td>

		<td class="change-cell down">-0.94%</td>
		<td class="change-cell down">-0.94%</td>
		<td class="change-cell hide-mobile down">-0.94%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/USD</td>
		<td class="price-cell">42.41</td>
		<td class="change-cell up">+0.25%</td>
		<td class="change-cell up">+1.04%</td>
		<td class="change-cell up">+1.04%</td>
		<td class="change-cell hide-mobile up">+1.04%</td>
	</tr>
	<tr>
		<td class="pair-cell">BTC/LTC</td>
		<td class="price-cell">1398.60</td>
		<td class="change-cell down">-1.68%</td>
		<td class="change-cell down">-1.68%</td>
		<td class="change-cell down">-1.68%</td>
		<td class="change-cell hide-mobile down">-1.68%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/BTC</td>
		<td class="price-cell">0.000715</td>
		<td class="change-cell up">+1.71%</td>
		<td class="change-cell up">+1.71%</td>
		<td class="change-cell up">+1.71%</td>
		<td class="change-cell hide-mobile up">+1.71%</td>
	</tr>
			</tbody>
		</table>
		<div class="date">last_update: 2026-06-28 19:47:31 UTC</div>
	</div>
</body>
</html>
