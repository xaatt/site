<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>crypto_terminal</title>
	<link rel="stylesheet" href="cc.css">
</head>
<body>
	<div class="terminal-container">
		<table>
			<thead>
				<tr>
					<th>pair</th>
					<th>price</th>
					<th>24h</th>
					<th>7d</th>
					<th class="hide-mobile">30d</th>
					<th class="hide-mobile">year</th>
				</tr>
			</thead>
			<tbody>
	<tr>
		<td class="pair-cell">BTC/USD</td>
		<td class="price-cell">59597.22</td>
		<td class="change-cell down">-1.43%</td>
		<td class="change-cell down">-0.33%</td>
		<td class="change-cell hide-mobile down">-0.33%</td>
		<td class="change-cell hide-mobile down">-0.33%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/USD</td>
		<td class="price-cell">42.79</td>
		<td class="change-cell down">-0.02%</td>
		<td class="change-cell up">+1.93%</td>
		<td class="change-cell hide-mobile up">+1.93%</td>
		<td class="change-cell hide-mobile up">+1.93%</td>
	</tr>
	<tr>
		<td class="pair-cell">BTC/LTC</td>
		<td class="price-cell">1393.73</td>
		<td class="change-cell down">-1.05%</td>
		<td class="change-cell down">-2.02%</td>
		<td class="change-cell hide-mobile down">-2.02%</td>
		<td class="change-cell hide-mobile down">-2.02%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/BTC</td>
		<td class="price-cell">0.000718</td>
		<td class="change-cell up">+1.06%</td>
		<td class="change-cell up">+2.06%</td>
		<td class="change-cell hide-mobile up">+2.06%</td>
		<td class="change-cell hide-mobile up">+2.06%</td>
	</tr>
			</tbody>
		</table>
		<div class="date">$ last_update: 2026-06-28 16:56:16 UTC</div>
	</div>
</body>
</html>
