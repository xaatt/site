<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>crypto_terminal</title>
	<link rel="stylesheet" href="cc.css">
</head>
<body>
	<div class="terminal-container">
		<table>
			<thead>
				<tr>
					<th>pair</th>
					<th>price</th>
					<th>change_24h</th>
					<th>change_7d</th>
				</tr>
			</thead>
			<tbody>
	<tr>
		<td class="pair-cell">BTC/USD</td>
		<td class="price-cell">59837.32</td>
		<td class="change-cell down">-1.03%</td>
		<td class="change-cell up">+0.07%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/USD</td>
		<td class="price-cell">42.88</td>
		<td class="change-cell up">+0.20%</td>
		<td class="change-cell up">+2.16%</td>
	</tr>
	<tr>
		<td class="pair-cell">BTC/LTC</td>
		<td class="price-cell">1396.65</td>
		<td class="change-cell down">-0.84%</td>
		<td class="change-cell down">-1.82%</td>
	</tr>
	<tr>
		<td class="pair-cell">LTC/BTC</td>
		<td class="price-cell">0.000716</td>
		<td class="change-cell up">+0.85%</td>
		<td class="change-cell up">+1.85%</td>
	</tr>
			</tbody>
		</table>
	</div>
	<div class="date">$ last_update: 2026-06-28 16:05:38 UTC</div>
</body>
</html>
