name: cc.html

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Update and Generate Premium Crypto Table (Go)
      run: |
        cat << 'EOF' > main.go
        package main

        import (
        	"encoding/json"
        	"fmt"
        	"io"
        	"net/http"
        	"os"
        	"strconv"
        	"strings"
        	"time"
        )

        type CoinbaseResponse struct {
        	Data struct {
        		Amount string `json:"amount"`
        	} `json:"data"`
        }

        type Point struct {
        	Timestamp time.Time
        	Price     float64
        }

        // Fetch spot price for any specific currency pair from Coinbase API
        func getPrice(pair string) (float64, error) {
        	resp, err := http.Get(fmt.Sprintf("https://api.coinbase.com/v2/prices/%s/spot", pair))
        	if err != nil {
        		return 0, err
        	}
        	defer resp.Body.Close()

        	body, _ := io.ReadAll(resp.Body)
        	var cbResp CoinbaseResponse
        	if err := json.Unmarshal(body, &cbResp); err != nil {
        		return 0, err
        	}

        	return strconv.ParseFloat(cbResp.Data.Amount, 64)
        }

        // Generate an SVG line based on time-series points
        func generateSVG(points []Point, strokeColor string, withCircles bool) string {
        	if len(points) < 2 {
        		return "<div class='no-data'>No data</div>"
        	}

        	svgWidth := 140
        	svgHeight := 34
        	minP := points[0].Price
        	maxP := points[0].Price

        	for _, pt := range points {
        		if pt.Price < minP { minP = pt.Price }
        		if pt.Price > maxP { maxP = pt.Price }
        	}

        	rng := maxP - minP
        	if rng == 0 { rng = 1.0 }

        	var pointsCoords []string
        	var circlesHTML []string
        	for i, pt := range points {
        		x := (float64(i) / float64(len(points)-1)) * float64(svgWidth-10) + 5
        		y := float64(svgHeight) - (((pt.Price - minP) / rng) * float64(svgHeight-10) + 5)
        		pointsCoords = append(pointsCoords, fmt.Sprintf("%.2f,%.2f", x, y))
        		if withCircles {
        			circlesHTML = append(circlesHTML, fmt.Sprintf(`<circle cx="%.2f" cy="%.2f" r="1.5" fill="#2c3e50"/>`, x, y))
        		}
        	}

        	return fmt.Sprintf(`
        	<svg viewBox="0 0 %d %d" class="sparkline">
        		<polyline fill="none" stroke="%s" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="%s"/>
        		%s
        	</svg>`, svgWidth, svgHeight, strokeColor, strings.Join(pointsCoords, " "), strings.Join(circlesHTML, "\n"))
        }

        // Process asset data, filter points, and return a clean HTML table row
        func processCoinRow(symbol, historyFile, strokeColor, unit string, precision int, price float64, nowStr string) string {
        	// 1. Log current price point to history CSV
        	var fileExists bool
        	if _, err := os.Stat(historyFile); err == nil {
        		fileExists = true
        	}

        	f, err := os.OpenFile(historyFile, os.O_CREATE|os.O_WRONLY|os.O_APPEND, 0644)
        	if err == nil {
        		if !fileExists {
        			f.WriteString("timestamp,price\n")
        		}
        		f.WriteString(fmt.Sprintf(fmt.Sprintf("%%s,%%.%df\n", precision), nowStr, price))
        		f.Close()
        	}

        	// 2. Read history and parse with real time tracking
        	data, err := os.ReadFile(historyFile)
        	if err != nil {
        		return "<tr><td colspan='5'>Data error</td></tr>"
        	}

        	lines := strings.Split(strings.TrimSpace(string(data)), "\n")
        	if len(lines) > 1 {
        		lines = lines[1:]
        	}

        	var points24h []Point
        	var points7d []Point
        	nowTime := time.Now().UTC()
        	timeLayout := "2006-01-02 15:04:05"

        	for _, line := range lines {
        		parts := strings.Split(line, ",")
        		if len(parts) == 2 {
        			tValue, _ := time.Parse(timeLayout, parts[0])
        			pValue, _ := strconv.ParseFloat(parts[1], 64)
        			duration := nowTime.Sub(tValue)
        			
        			if duration <= 24*time.Hour {
        				points24h = append(points24h, Point{Timestamp: tValue, Price: pValue})
        			}
        			if duration <= 7*24*time.Hour {
        				points7d = append(points7d, Point{Timestamp: tValue, Price: pValue})
        			}
        		}
        	}

        	// 3. Calculate dynamic percentage based on the oldest point in the 24h window
        	changePercent := 0.0
        	trendClass := "neutral"
        	changeText := "0.00%"

        	if len(points24h) > 1 {
        		oldPrice := points24h[0].Price
        		if oldPrice > 0 {
        			changePercent = ((price - oldPrice) / oldPrice) * 100
        		}
        		if changePercent > 0 {
        			trendClass = "up"
        			changeText = fmt.Sprintf("+%.2f%% ↗", changePercent)
        		} else if changePercent < 0 {
        			trendClass = "down"
        			changeText = fmt.Sprintf("%.2f%% ↘", changePercent)
        		}
        	}

        	// 4. Generate both SVGs
        	svg24h := generateSVG(points24h, strokeColor, true)
        	svg7d := generateSVG(points7d, strokeColor, false)

        	priceLabelFormat := fmt.Sprintf("%%.%df", precision)
        	mainPriceStr := fmt.Sprintf(priceLabelFormat, price)

        	// Return structured HTML table row
        	return fmt.Sprintf(`
        	<tr>
        		<td class="pair-cell"><b>%s</b></td>
        		<td class="price-cell"><span class="currency">%s</span><b>%s</b></td>
        		<td class="change-cell"><span class="trend badge-%s">%s</span></td>
        		<td class="chart-cell">%s</td>
        		<td class="chart-cell">%s</td>
        	</tr>`, symbol, unit, mainPriceStr, trendClass, changeText, svg24h, svg7d)
        }

        func main() {
        	nowStr := time.Now().UTC().Format("2006-01-02 15:04:05")

        	// Fetch market prices directly from Coinbase API endpoints
        	btcUSDPrice, _ := getPrice("BTC-USD")
        	ltcUSDPrice, _ := getPrice("LTC-USD")
        	btcLtcPrice, _ := getPrice("BTC-LTC")
        	ltcBtcPrice, _ := getPrice("LTC-BTC")

        	// 1. Generate table rows
        	btcUsdRow := processCoinRow("BTC / USD", "history_btc_usd.csv", "#f39c12", "$", 2, btcUSDPrice, nowStr)
        	ltcUsdRow := processCoinRow("LTC / USD", "history_ltc_usd.csv", "#3498db", "$", 2, ltcUSDPrice, nowStr)
        	btcLtcRow := processCoinRow("BTC / LTC", "history_btc_ltc.csv", "#9b59b6", "Ł", 2, btcLtcPrice, nowStr)
        	ltcBtcRow := processCoinRow("LTC / BTC", "history_ltc_btc.csv", "#2ecc71", "₿", 6, ltcBtcPrice, nowStr)

        	// 2. Save professional compact table styles to external cc.css file
        	cssContent := "body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f8f9fa; color: #212529; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 40px 20px; box-sizing: border-box; }\n" +
        		".table-container { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); max-width: 1000px; width: 100%; box-sizing: border-box; border: 1px solid #eff2f5; }\n" +
        		"table { width: 100%; border-collapse: collapse; text-align: left; }\n" +
        		"th { padding: 14px 16px; color: #707a8a; font-size: 12px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #eff2f5; }\n" +
        		"td { padding: 16px; border-bottom: 1px solid #eff2f5; font-size: 15px; vertical-align: middle; }\n" +
        		"tr:last-child td { border-bottom: none; }\n" +
        		"tr:hover td { background: #fcfdfe; }\n" +
        		".pair-cell { color: #1e2329; font-size: 16px; }\n" +
        		".price-cell { color: #1e2329; white-space: nowrap; font-size: 16px; line-height: 1.2; }\n" +
        		".currency { color: #707a8a; font-size: 11px; font-weight: 600; position: relative; top: -4px; margin-right: 1px; font-family: sans-serif; }\n" +
        		".trend { font-size: 14px; font-weight: 600; padding: 4px 8px; border-radius: 6px; white-space: nowrap; }\n" +
        		".badge-up { color: #0ecb81; background: rgba(14,203,129,0.1); }\n" +
        		".badge-down { color: #f6465d; background: rgba(246,70,93,0.1); }\n" +
        		".badge-neutral { color: #707a8a; background: #f0f2f5; }\n" +
        		".sparkline { width: 140px; height: 34px; display: block; }\n" +
        		".date { font-size: 12px; color: #707a8a; margin-top: 24px; text-align: center; }"

        	os.WriteFile("cc.css", []byte(cssContent), 0644)

        	// 3. Assemble final HTML document
        	htmlContent := `<!DOCTYPE html>
        <html lang="ru">
        <head>
        	<meta charset="UTF-8">
        	<meta name="viewport" content="width=device-width, initial-scale=1.0">
        	<title>Крипто Терминал</title>
        	<link rel="stylesheet" href="cc.css">
        </head>
        <body>
        	<div class="table-container">
        		<table>
        			<thead>
        				<tr>
        					<th>Пара</th>
        					<th>Цена</th>
        					<th>Изменение (24ч)</th>
        					<th>Оперативный (24ч)</th>
        					<th>График (7д)</th>
        				</tr>
        			</thead>
        			<tbody>` + btcUsdRow + ltcUsdRow + btcLtcRow + ltcBtcRow + `
        			</tbody>
        		</table>
        	</div>
        	<div class="date">Last update: ` + nowStr + ` UTC</div>
        </body>
        </html>`

        	os.WriteFile("cc.html", []byte(htmlContent), 0644)
        }
        EOF
        
        go run main.go
        rm main.go

    - name: Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add cc.html cc.css history_btc_usd.csv history_ltc_usd.csv history_ltc_btc.csv history_btc_ltc.csv
        git diff-index --quiet HEAD || git commit -m "Automated dashboard update"
        git push
