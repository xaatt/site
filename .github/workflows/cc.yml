name: cc.html

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Update and Generate Pure Text Metrics Table (Go)
      run: |
        cat << 'EOF' > main.go
        package main

        import (
        	"encoding/json"
        	"fmt"
        	"io"
        	"net/http"
        	"os"
        	"strconv"
        	"strings"
        	"time"
        )

        type CoinbaseResponse struct {
        	Data struct {
        		Amount string `json:"amount"`
        	} `json:"data"`
        }

        type Point struct {
        	Timestamp time.Time
        	Price     float64
        }

        func getPrice(pair string) (float64, error) {
        	resp, err := http.Get(fmt.Sprintf("https://api.coinbase.com/v2/prices/%s/spot", pair))
        	if err != nil {
        		return 0, err
        	}
        	defer resp.Body.Close()

        	body, _ := io.ReadAll(resp.Body)
        	var cbResp CoinbaseResponse
        	if err := json.Unmarshal(body, &cbResp); err != nil {
        		return 0, err
        	}

        	return strconv.ParseFloat(cbResp.Data.Amount, 64)
        }

        func processCoinRow(symbol, historyFile string, precision int, price float64, nowStr string) string {
        	var fileExists bool
        	if _, err := os.Stat(historyFile); err == nil {
        		fileExists = true
        	}

        	f, err := os.OpenFile(historyFile, os.O_CREATE|os.O_WRONLY|os.O_APPEND, 0644)
        	if err == nil {
        		if !fileExists {
        			f.WriteString("timestamp,price\n")
        		}
        		f.WriteString(fmt.Sprintf(fmt.Sprintf("%%s,%%.%df\n", precision), nowStr, price))
        		f.Close()
        	}

        	data, err := os.ReadFile(historyFile)
        	if err != nil {
        		return "<tr><td colspan='6'>err</td></tr>"
        	}

        	lines := strings.Split(strings.TrimSpace(string(data)), "\n")
        	if len(lines) > 1 {
        		lines = lines[1:]
        	}

        	var points24h []Point
        	var points7d []Point
        	var points30d []Point
        	var pointsYear []Point
        	
        	nowTime := time.Now().UTC()
        	timeLayout := "2006-01-02 15:04:05"

        	for _, line := range lines {
        		parts := strings.Split(line, ",")
        		if len(parts) == 2 {
        			tValue, _ := time.Parse(timeLayout, parts[0])
        			pValue, _ := strconv.ParseFloat(parts[1], 64)
        			duration := nowTime.Sub(tValue)
        			
        			if duration <= 24*time.Hour {
        				points24h = append(points24h, Point{Timestamp: tValue, Price: pValue})
        			}
        			if duration <= 7*24*time.Hour {
        				points7d = append(points7d, Point{Timestamp: tValue, Price: pValue})
        			}
        			if duration <= 30*24*time.Hour {
        				points30d = append(points30d, Point{Timestamp: tValue, Price: pValue})
        			}
        			if duration <= 365*24*time.Hour {
        				pointsYear = append(pointsYear, Point{Timestamp: tValue, Price: pValue})
        			}
        		}
        	}

        	calcDiff := func(pts []Point) (string, string) {
        		if len(pts) < 2 {
        			return "0.00%", "neutral"
        		}
        		oldPrice := pts[0].Price
        		if oldPrice <= 0 {
        			return "0.00%", "neutral"
        		}
        		diff := ((price - oldPrice) / oldPrice) * 100
        		if diff > 0 {
        			return fmt.Sprintf("+%.2f%%", diff), "up"
        		} else if diff < 0 {
        			return fmt.Sprintf("%.2f%%", diff), "down"
        		}
        		return "0.00%", "neutral"
        	}

        	change24hText, class24h := calcDiff(points24h)
        	change7dText, class7d := calcDiff(points7d)
        	change30dText, class30d := calcDiff(points30d)
        	changeYearText, classYear := calcDiff(pointsYear)

        	priceLabelFormat := fmt.Sprintf("%%.%df", precision)
        	mainPriceStr := fmt.Sprintf(priceLabelFormat, price)

        	return fmt.Sprintf(`
        	<tr>
        		<td class="pair-cell">%s</td>
        		<td class="price-cell">%s</td>
        		<td class="change-cell %s">%s</td>
        		<td class="change-cell %s">%s</td>
        		<td class="change-cell %s">%s</td>
        		<td class="change-cell %s">%s</td>
        	</tr>`, symbol, mainPriceStr, class24h, change24hText, class7d, change7dText, class30d, change30dText, classYear, changeYearText)
        }

        func main() {
        	nowStr := time.Now().UTC().Format("2006-01-02 15:04:05")

        	btcUSDPrice, _ := getPrice("BTC-USD")
        	ltcUSDPrice, _ := getPrice("LTC-USD")
        	btcLtcPrice, _ := getPrice("BTC-LTC")
        	ltcBtcPrice, _ := getPrice("LTC-BTC")

        	btcUsdRow := processCoinRow("BTC/USD", "history_btc_usd.csv", 2, btcUSDPrice, nowStr)
        	ltcUsdRow := processCoinRow("LTC/USD", "history_ltc_usd.csv", 2, ltcUSDPrice, nowStr)
        	btcLtcRow := processCoinRow("BTC/LTC", "history_btc_ltc.csv", 2, btcLtcPrice, nowStr)
        	ltcBtcRow := processCoinRow("LTC/BTC", "history_ltc_btc.csv", 6, ltcBtcPrice, nowStr)

        	// Чистый моноширинный CSS без картинок
        	cssContent := "body { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; background: #1a1b26; color: #a9b1d6; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }\n" +
        		".terminal-container { width: 100%; max-width: 750px; box-sizing: border-box; overflow-x: hidden; }\n" +
        		"table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: auto; }\n" +
        		"th { padding: 8px 12px; color: #565f89; font-size: 12px; font-weight: normal; text-transform: lowercase; border-bottom: 1px dashed #414868; text-align: left; }\n" +
        		"td { padding: 10px 12px; border-bottom: 1px solid #24283b; font-size: 13px; vertical-align: middle; white-space: nowrap; }\n" +
        		"tr:hover td { background: #202231; }\n" +
        		".pair-cell { color: #7aa2f7; }\n" +
        		".price-cell { color: #c0caf5; font-weight: 500; }\n" +
        		".change-cell { font-size: 13px; }\n" +
        		".up { color: #9ece6a; }\n" +
        		".down { color: #f7768e; }\n" +
        		".neutral { color: #a9b1d6; }\n" +
        		".date { font-size: 11px; color: #565f89; margin-top: 20px; font-style: italic; width: 100%; max-width: 750px; text-align: left; padding-left: 12px; }\n" +
        		"@media (max-width: 650px) {\n" +
        		"  body { padding: 10px 5px; }\n" +
        		"  td, th { font-size: 11px; padding: 8px 6px; }\n" +
        		"}\n" +
        		"@media (max-width: 450px) {\n" +
        		"  td, th { font-size: 10px; padding: 6px 3px; }\n" +
        		"}"

        	os.WriteFile("cc.css", []byte(cssContent), 0644)

        	htmlContent := `<!DOCTYPE html>
        <html lang="en">
        <head>
        	<meta charset="UTF-8">
        	<meta name="viewport" content="width=device-width, initial-scale=1.0">
        	<title>crypto_terminal</title>
        	<link rel="stylesheet" href="cc.css">
        </head>
        <body>
        	<div class="terminal-container">
        		<table>
        			<thead>
        				<tr>
        					<th>pair</th>
        					<th>price</th>
        					<th>change_24h</th>
        					<th>change_7d</th>
        					<th>change_30d</th>
        					<th>change_year</th>
        				</tr>
        			</thead>
        			<tbody>` + btcUsdRow + ltcUsdRow + btcLtcRow + ltcBtcRow + `
        			</tbody>
        		</table>
        	</div>
        	<div class="date">$ last_update: ` + nowStr + ` UTC</div>
        </body>
        </html>`

        	os.WriteFile("cc.html", []byte(htmlContent), 0644)
        }
        EOF
        
        go run main.go
        rm main.go

    - name: Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add cc.html cc.css history_btc_usd.csv history_ltc_usd.csv history_ltc_btc.csv history_btc_ltc.csv
        git diff-index --quiet HEAD || git commit -m "Automated dashboard update"
        git push
