name: Update LTC Price

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Update Price Page
      run: |
        URL="https://api.coinbase.com/v2/prices/LTC-USD/spot"
        PRICE=$(curl -s "$URL" | grep -o '"amount":"[^"]*"' | cut -d'"' -f4)
        if [ -z "$PRICE" ]; then
          echo "API Error"
          exit 1
        fi
        echo "<!DOCTYPE html>" > ltc.html
        echo "<html lang='ru'><head><meta charset='UTF-8'>" >> ltc.html
        echo "<meta name='viewport' content='width=device-width, initial-scale=1.0'>" >> ltc.html
        echo "<title>Курс Litecoin (LTC)</title>" >> ltc.html
        echo "<style>" >> ltc.html
        echo "body { font-family: sans-serif; background: #f5f7fa; " >> ltc.html
        echo "color: #333; display: flex; justify-content: center; " >> ltc.html
        echo "align-items: center; height: 100vh; margin: 0; }" >> ltc.html
        echo ".container { background: white; padding: 30px; " >> ltc.html
        echo "border-radius: 12px; text-align: center; " >> ltc.html
        echo "box-shadow: 0 4px 20px rgba(0,0,0,0.05); }" >> ltc.html
        echo "h1 { font-size: 20px; color: #666; margin: 0 0 10px 0; }" >> ltc.html
        echo ".price { font-size: 48px; font-weight: bold; color: #2c3e50; }" >> ltc.html
        echo ".currency { font-size: 24px; color: #7f8c8d; }" >> ltc.html
        echo ".date { font-size: 12px; color: #bdc3c7; margin-top: 20px; }" >> ltc.html
        echo "</style></head><body>" >> ltc.html
        echo "<div class='container'>" >> ltc.html
        echo "<h1>Текущая цена Litecoin (LTC)</h1>" >> ltc.html
        echo "<div class='price'>\$$PRICE <span class='currency'>USD</span></div>" >> ltc.html
        echo "<div class='date'>Последнее обновление: $(date -u '+%Y-%m-%d %H:%M:%S') UTC</div>" >> ltc.html
        echo "</div></body></html>" >> ltc.html

    - name: Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add ltc.html
        git diff-index --quiet HEAD || git commit -m "Автоматическое обновление курса LTC"
        git push
