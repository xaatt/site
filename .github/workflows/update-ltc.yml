name: Update Litecoin Price

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate page
        run: |
          PRICE=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=litecoin&vs_currencies=usd" | jq -r '.litecoin.usd')

          UPDATED=$(date -u '+%Y-%m-%d %H:%M UTC')

          sed \
            -e "s/{{PRICE}}/$PRICE/g" \
            -e "s/{{UPDATED}}/$UPDATED/g" \
            template-ltc.html > ltc.html

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add ltc.html

          if ! git diff --cached --quiet; then
            git commit -m "Update LTC price"
            git push
          fi
